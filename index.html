<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>KTMEX IL - Panel de Control & KPIs</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: #f4f7f6; }
        nav { width: 260px; background: #1a1c2c; color: white; height: 100vh; padding: 25px; position: fixed; }
        main { margin-left: 260px; padding: 40px; flex: 1; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        h2 { color: #e30613; margin-top: 0; }
        .nav-btn { background: transparent; color: #a0a0a0; border: 1px solid #2d2f45; padding: 14px; width: 100%; border-radius: 8px; text-align: left; cursor: pointer; margin-bottom: 10px; font-weight: 600; }
        .nav-btn.active { background: #e30613; color: white; border-color: #e30613; }
        .grid-kpi { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        canvas { max-height: 300px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
    </style>
</head>
<body>

<nav>
    <h2 style="color:white;">KTMEX IL</h2>
    <button class="nav-btn active" onclick="location.hash='dash'" id="nav-dash">📊 Dashboard KPIs</button>
    <button class="nav-btn" onclick="location.hash='parts'" id="nav-parts">📦 Maestro Partes</button>
    <button class="nav-btn" onclick="location.hash='gallery'" id="nav-gallery">🖼️ Biblioteca Imágenes</button>
    <button class="nav-btn" onclick="location.hash='logs'" id="nav-logs">📋 Bitácora Completa</button>
</nav>

<main>
    <div id="section-dash" class="card">
        <h2>Indicadores de Desempeño (KPIs)</h2>
        <div class="grid-kpi">
            <div class="card"><canvas id="chart-ops"></canvas></div>
            <div class="card"><canvas id="chart-ng"></canvas></div>
            <div class="card"><canvas id="chart-sebango"></canvas></div>
            <div class="card">
                <h3>Resumen General</h3>
                <div id="kpi-stats">Cargando datos...</div>
            </div>
        </div>
    </div>

    <div id="section-parts" class="card" style="display:none;">
        <h2>Sincronizar Maestro</h2>
        <input type="file" id="excel-parts" accept=".xlsx">
        <button onclick="uploadMaster()" style="background:#e30613; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer;">Subir</button>
    </div>

    <div id="section-gallery" class="card" style="display:none;">
        <h2>Carga Masiva de Imágenes (Paso 4)</h2>
        <input type="file" id="img-input" multiple accept="image/*">
        <div id="status-img"></div>
    </div>

    <div id="section-logs" class="card" style="display:none;">
        <h2>Bitácora de Operación (OK / NG)</h2>
        <button onclick="exportLogs()" style="margin-bottom:10px;">Descargar Excel</button>
        <table>
            <thead><tr><th>Fecha</th><th>Usuario</th><th>ID</th><th>Status</th><th>Detalle</th></tr></thead>
            <tbody id="log-body"></tbody>
        </table>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6Il03GHS4L_eDY1Kv3fMyF2EwuYLQ5qY",
        authDomain: "logistica-ktmex.firebaseapp.com",
        projectId: "logistica-ktmex",
        storageBucket: "logistica-ktmex.firebasestorage.app",
        messagingSenderId: "166597623735",
        appId: "1:166597623735:web:c0f8d372bc1ee12d81b232"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Navegación
    window.onhashchange = () => {
        const h = window.location.hash.replace('#','') || 'dash';
        ['dash','parts','gallery','logs'].forEach(s => {
            document.getElementById(`section-${s}`).style.display = h === s ? 'block' : 'none';
            document.getElementById(`nav-${s}`).classList.toggle('active', h === s);
        });
    };

    // Bitácora en tiempo real (OK y NG)
    onSnapshot(query(collection(db, "Bitacora_Incidencias"), orderBy("timestamp", "desc")), (snap) => {
        const body = document.getElementById('log-body');
        body.innerHTML = "";
        let logs = [];
        snap.forEach(doc => {
            const d = doc.data();
            logs.push(d);
            body.innerHTML += `<tr>
                <td>${d.timestamp?.toDate().toLocaleString() || ''}</td>
                <td>${d.usuario}</td>
                <td>${d.customer_id}</td>
                <td style="color:${d.status === 'OK' ? 'green' : 'red'}"><b>${d.status}</b></td>
                <td>${d.error_msg || '-'}</td>
            </tr>`;
        });
        updateCharts(logs);
    });

    function updateCharts(data) {
        const ops = {}, ngOps = {}, sebNG = {};
        data.forEach(r => {
            ops[r.usuario] = (ops[r.usuario] || 0) + 1;
            if(r.status === 'NG') {
                ngOps[r.usuario] = (ngOps[r.usuario] || 0) + 1;
                sebNG[r.customer_id] = (sebNG[r.customer_id] || 0) + 1;
            }
        });

        new Chart(document.getElementById('chart-ops'), {
            type: 'bar',
            data: { labels: Object.keys(ops), datasets: [{ label: 'Escaneos Totales', data: Object.values(ops), backgroundColor: '#1a1c2c' }] },
            options: { plugins: { title: { display: true, text: 'Productividad por Operador' } } }
        });

        new Chart(document.getElementById('chart-ng'), {
            type: 'pie',
            data: { labels: Object.keys(ngOps), datasets: [{ data: Object.values(ngOps), backgroundColor: ['#e30613', '#f39c12', '#7f8c8d'] }] },
            options: { plugins: { title: { display: true, text: 'Errores (NG) por Operador' } } }
        });
    }
</script>
</body>
</html>
